spring.application.name=codeit
server.port=9091
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codeit}
spring.datasource.username=postgres
spring.datasource.password=ROOT
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
judge0.api.url=${JUDGE0_API_URL:http://localhost:2358}

spring.data.redis.host=localhost
spring.data.redis.port=6379

codeit.cache.leaderboard-ttl-seconds=60
codeit.cache.competition-ttl-seconds=120
codeit.cache.problem-ttl-seconds=1800
codeit.cache.testcase-ttl-seconds=1800

codeit.judge.max-parallelism=8

codeit.jwt.secret=${CODEIT_JWT_SECRET:1234567891011121314151617181920212223242526272829303132}
codeit.jwt.expiration-ms=86400000

server.error.include-stacktrace=never
server.error.include-message=always